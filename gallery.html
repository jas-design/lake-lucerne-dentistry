<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Lake Lucerne Cosmetic & Implant Dentistry</title>
    <link rel="stylesheet" href="src/index.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="src/main.js"></script>
</head>
<body class="bg-white">
    <div id="header-placeholder"></div>

    <main>
        <!-- Inner Hero -->
        <section class="relative pt-48 pb-32 bg-accent overflow-hidden">
            <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 text-center">
                <h1 class="font-serif text-6xl font-bold text-white italic mb-6">Patient Gallery</h1>
                <div class="flex items-center justify-center space-x-4 text-primary text-sm font-bold uppercase tracking-widest">
                    <a href="index.html" class="hover:text-white transition-colors">Home</a>
                    <span>/</span>
                    <span class="text-white">Gallery</span>
                </div>
            </div>
        </section>

        <section class="py-32 bg-white">
            <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
                <div class="text-center mb-20 space-y-4">
                    <span class="text-primary font-bold uppercase tracking-[0.3em] text-xs">Transformations</span>
                    <h2 class="font-serif text-5xl font-bold text-accent italic">Real Patients, Real Results</h2>
                </div>

                <div class="grid grid-cols-1 gap-8 sm:grid-cols-2 lg:grid-cols-3">
                    <div class="gallery-item group cursor-pointer overflow-hidden rounded-[50px] shadow-sm relative h-[450px]">
                        <img src="https://images.unsplash.com/photo-1629909613654-2871b8868bca?auto=format&fit=crop&q=80&w=800" class="h-full w-full object-cover transition-transform duration-700 group-hover:scale-110">
                        <div class="absolute inset-0 bg-gradient-to-t from-accent/90 via-accent/20 to-transparent opacity-0 group-hover:opacity-100 transition-all duration-500 flex flex-col items-center justify-end p-10 text-white">
                            <span class="font-bold text-xs uppercase tracking-widest text-primary mb-2">Cosmetic Dentistry</span>
                            <h4 class="font-serif text-2xl font-bold italic text-center">Full Smile Makeover</h4>
                        </div>
                    </div>
                    <div class="gallery-item group cursor-pointer overflow-hidden rounded-[50px] shadow-sm relative h-[450px]">
                        <img src="https://images.unsplash.com/photo-1606811841689-23dfddce3e95?auto=format&fit=crop&q=80&w=800" class="h-full w-full object-cover transition-transform duration-700 group-hover:scale-110">
                        <div class="absolute inset-0 bg-gradient-to-t from-accent/90 via-accent/20 to-transparent opacity-0 group-hover:opacity-100 transition-all duration-500 flex flex-col items-center justify-end p-10 text-white">
                            <span class="font-bold text-xs uppercase tracking-widest text-primary mb-2">Dental Implants</span>
                            <h4 class="font-serif text-2xl font-bold italic text-center">Precise Restoration</h4>
                        </div>
                    </div>
                    <!-- Add more as needed -->
                </div>
            </div>
        </section>
    </main>

    <!-- Lightbox -->
    <div id="lightbox" class="fixed inset-0 z-[100] bg-black/90 hidden items-center justify-center p-4">
        <button id="close-lightbox" class="absolute top-8 right-8 text-white p-2 hover:text-primary transition-colors"><i data-lucide="x" class="w-10 h-10"></i></button>
        <img id="lightbox-img" src="" class="max-w-full max-h-[90vh] rounded-lg shadow-2xl">
    </div>

    <div id="footer-placeholder"></div>
</body>
</html>

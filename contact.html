<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Lake Lucerne Cosmetic & Implant Dentistry</title>
    <link rel="stylesheet" href="/src/index.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="/src/main.js"></script>
</head>
<body class="bg-white">
    <div id="header-placeholder"></div>

    <main>
        <!-- Inner Hero -->
        <section class="relative pt-48 pb-32 bg-accent overflow-hidden">
            <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 text-center">
                <h1 class="font-serif text-6xl font-bold text-white italic mb-6">Contact Us</h1>
                <div class="flex items-center justify-center space-x-4 text-primary text-sm font-bold uppercase tracking-widest">
                    <a href="index.html" class="hover:text-white transition-colors">Home</a>
                    <span>/</span>
                    <span class="text-white">Contact</span>
                </div>
            </div>
        </section>

        <section class="py-32 bg-white">
            <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
                <div class="flex flex-col gap-24 lg:flex-row items-start">
                    <div class="flex-1 space-y-12">
                        <div class="space-y-4">
                            <span class="text-primary font-bold uppercase tracking-[0.3em] text-xs">Reach Out</span>
                            <h2 class="font-serif text-5xl font-bold italic text-accent">Get In Touch <br><span class="text-primary not-italic">& Consultation</span></h2>
                            <p class="text-slate-500 leading-relaxed max-w-md">Contact our Orlando office to schedule your consultation or to learn more about our treatments.</p>
                        </div>
                        <div class="space-y-10">
                             <div class="flex items-start space-x-8">
                                <div class="w-16 h-16 bg-bg-warm rounded-3xl flex items-center justify-center text-primary group hover:bg-primary hover:text-white transition-all"><i data-lucide="phone" class="w-8 h-8"></i></div>
                                <div><p class="text-xs text-gray-400 uppercase font-bold tracking-widest mb-2">Phone Number</p><p class="text-2xl font-serif font-bold text-accent italic">+1 (407) 555-0123</p></div>
                             </div>
                             <div class="flex items-start space-x-8">
                                <div class="w-16 h-16 bg-bg-warm rounded-3xl flex items-center justify-center text-primary group hover:bg-primary hover:text-white transition-all"><i data-lucide="mail" class="w-8 h-8"></i></div>
                                <div><p class="text-xs text-gray-400 uppercase font-bold tracking-widest mb-2">Email Address</p><p class="text-2xl font-serif font-bold text-accent italic">info@lakelucerne.com</p></div>
                             </div>
                             <div class="flex items-start space-x-8">
                                <div class="w-16 h-16 bg-bg-warm rounded-3xl flex items-center justify-center text-primary group hover:bg-primary hover:text-white transition-all"><i data-lucide="map-pin" class="w-8 h-8"></i></div>
                                <div><p class="text-xs text-gray-400 uppercase font-bold tracking-widest mb-2">Location</p><p class="text-2xl font-serif font-bold text-accent italic">Orlando, Florida</p></div>
                             </div>
                        </div>
                    </div>

                    <div class="flex-1 w-full bg-bg-warm rounded-[60px] p-12 shadow-sm border border-white relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-bl-[100px]"></div>
                        <form id="contact-form" class="space-y-8 relative z-10">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                                <div class="space-y-2">
                                    <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 ml-2">Your Name</label>
                                    <input type="text" placeholder="John Doe" required class="w-full rounded-3xl bg-white p-5 outline-none focus:ring-2 focus:ring-primary transition-all">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 ml-2">Your Email</label>
                                    <input type="email" placeholder="john@example.com" required class="w-full rounded-3xl bg-white p-5 outline-none focus:ring-2 focus:ring-primary transition-all">
                                </div>
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 ml-2">Your Message</label>
                                <textarea placeholder="How can we help you?" required rows="5" class="w-full rounded-3xl bg-white p-6 outline-none focus:ring-2 focus:ring-primary transition-all resize-none"></textarea>
                            </div>
                            <button type="submit" class="w-full rounded-full bg-primary py-6 font-bold uppercase tracking-[0.2em] text-xs text-white hover:bg-accent transition-all shadow-xl hover:-translate-y-1">Send Message To Us</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
</body>
</html>
